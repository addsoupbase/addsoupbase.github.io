<body>
<div>

    <h1>Auto icon sizer</h1>
    <label>
        Input file image
        <input type="file" accept="image/*" id="i">
    </label>
</div>
<button disabled id="b">Download</button>
<script type="module">
    import $ from '../yay.js'
    import * as h from "../handle.js"

    let {i: input, b: button} = $.id
    let images = new Set,
        sizes = new Set('57 60 72 76 114 120 144 152 180'.split(' ').map(Number))
    let ctx = $('canvas')
    ctx.setAttr({'moz-opaque': true})
    ctx.imageSmoothingEnabled=true
    ctx.imageSmoothingQuality='high'
    ctx = ctx.getContext('2d', {
        alpha: false
    })
    input.on({
        async change() {
            let file = $('img',
                {
                    attr: {
                        src: URL.createObjectURL(this.files[0])
                    }
                }
            )
            await Promise.all([h.until(file.valueOf(), 'load'), file.decode()])
            file = file.valueOf()
            let zip = JSZip()
            for (let size of sizes) {
                $(ctx.canvas).setAttr({
                    width: size,
                    height: size
                })
                ctx.drawImage(file, 0, 0, size, size)
                zip.file(`icon-${size}x${size}.png`, await new Promise(ctx.canvas.toBlob.bind(ctx.canvas))
                )
            }
            button.setAttr({disabled: false})
            .on({
                async _click() {
                    this.fadeOut()
                    h.download(await zip.generateAsync({type: 'blob'}),'icons')
                }
            })
        }
    })
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" async=""></script>
</body>

</html>
