        }}-->
    </noscript>
    <script blocking="render">
        !function (hour, d) {
            'use strict'
            var time
                , hash = location.hash.substring(1)
                , valid = new Set(['night', 'dawn', 'morning', 'day', 'dusk', 'evening'])
                , data = d.documentElement.dataset
            addEventListener('hashchange', function () {
                hash = location.hash.substring(1)
                var t = hash
                if (!valid.has(hash)) t = time
                time = data.tod = t
            })
            if (valid.has(hash)) { time = location.hash.slice(1) }
            else if (hour >= 0 && hour < 5) time = 'night'
            else if (hour >= 5 && hour < 6) time = 'dawn'
            else if (hour >= 6 && hour < 12) time = 'morning'
            else if (hour >= 12 && hour < 17) time = 'day' // or afternoon
            else if (hour >= 17 && hour < 19) time = 'dusk'
            else if (hour >= 19 && hour < 21) time = 'evening'
            else time = 'night'
            data.tod = time
            for (var i = 4; i--;) {
                var n = d.createElement('link')
                n.rel = 'preload'
                n.blocking = 'render'
                n.fetchPriority = 'high'
                n.href = 'media/' + time + '/' + (i + 1) + '.png'
                n.as = 'image'
                d.head.appendChild(n)
            }
            if (typeof CSSPropertyRule === 'undefined' && window.CSS && CSS.registerProperty)
                // @property is newer than CSS.registerProperty
                for (var i = 5; i--;)
                    CSS.registerProperty({
                        name: "--bgpos-" + (i + 1),
                        syntax: "<length-percentage>",
                        initialValue: "0px",
                        inherits: false
                    })
        }(new Date().getHours(), document)
        addEventListener('load', function () { console.log('%cBackground Credits: https://free-game-assets.itch.io/free-sky-with-clouds-background-pixel-art-set', 'font-size:2em') }, { once: true })
    </script>
