<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <script src="./silence.js"></script>
    <template id="template">
        <main id="main" class="center cute-green" style="opacity: 0.95;">
            <section>
                <div id="maindesc">
                    <div class="descrHolder">
                        <p>My name is...</p>
                        <h1>Misha</h1><i>Миша</i>
                    </div>
                    <div class="descrHolder">
                        <p>I am...</p>
                        <h1 id="age">[age]</h1><time class="small" id="bday">June 17 2007</time>
                    </div>
                </div>
            </section><a class="cute-green-button back" href="main.html">Back</a>
            <h1>Favourite pokemon:</h1>
            <div id="pokemonholder"></div>
        </main>
    </template>
    <script src="fallback.js"></script>
    <script type="module">
        import $ from './yay.js'
        import { wait } from './handle.js'
        let { template } = $.byId
        document.body.appendChild(document.importNode(template.content, true))
        const { main } = $.byId
        const bday = new Date(2007, 6 - 1, 17)
        let div = $("section", {
            parent: main
        })
        main.fadeFromTo(0, .95)
        $.gid('age').innerHTML = `${Math.floor(new Date().getFullYear() - bday.getFullYear() - (bday.getMonth() / 12))} years old`
        let pokemonholder = $.gid('pokemonholder')
        pokemonholder.push('spinda misdreavus mawile delcatty masquerain shedinja clamperl swoobat gourgeist minior trapinch pheromosa meloetta cherrim aegislash zygarde wobbuffet tinkaton ogerpon surskit darmanitan'
            .split(' ').map(o => $(`img.pkm.${o}`, {
                attr: { alt: o, title: o, src: `./media/${o}.gif` }
            })))
    </script>
    
</body>

</html>
