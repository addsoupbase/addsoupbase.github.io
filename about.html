<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <script type="module">
        import $ from './quick.js'
        import { wait } from './handle.js'
        const main = $('main.center .cute-green #main', {
            parent: document.body,
        })
        main.fadein()
        const bday = new Date(2007, 5, 17)

        let div = $("section", {
            parent: main
        })
        $('a.cute-green-button .back', {
            parent: main,
            txt: 'Back',
            attr: { href: 'main.html', }
        })

        let desc = $('div #maindesc', { parent: div })
        main.styleMe({ opacity: 0 })
        await wait(600)
        main.fadein()
        main.styleMe({ opacity: .95 })

        $('div.descrHolder', {
            parent: desc,
            os: [$("p", { txt: 'My name is...' }), $("h1<Misha>"), $('i,small<Миша>')]
        })
        $('div.descrHolder', {
            parent: desc,
            os: [$("p<I am...>",), $(`h1< ${Math.floor(new Date().getFullYear() - bday.getFullYear() - (bday.getMonth() / 12))} years old>`), $('i.small', { txt: 'June 17 2007' })]
        })
        $('h3<Fav pokemon>', {
            parent: main
        })
        let pokemonholder = $('div #pokemonholder', {
            parent: main,
            os: ['spinda', 'misdreavus', 'mawile', 'delcatty', 'masquerain', 'shedinja', 'clamperl', 'swoobat', 'gourgeist', 'minior', "trapinch", 'pheromosa'].map(o => $('img.pkm', { attr: { alt: o, title: o, src: `./media/${o}_.webp` } }))
        });

        /*$("h2", {
            parent:main,
            txt:'Things I like'
        })
        $('ul', {
            id: 'list',
            parent:main,
            os: ['pokémon', 'HYPER PEOPLE','sparkly stuff'].map(o=>$('li', {
                txt: o,
                id: o.replaceAll(' ','')
            }))
        })*/
    </script>
</body>

</html>
