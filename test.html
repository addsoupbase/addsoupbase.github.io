<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas bg thingy thing 123</title>
    <meta name="color-scheme" content="dark">
</head>

<body>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
        }

        div {
            border: 1px solid white;
            margin-block: 5px;
            place-content: center;
            /* background-size: contain; */
        }
    </style>
    <h1>Canvas as background</h1>
    <p>Supported: <samp id="status"></samp></p>
    <script>
        document.getElementById('status').textContent = !!(document.getCSSCanvasContext || document.mozSetImageElement)
    </script>
    <section style="display: grid;" id="n">
        <div style="width: 300px; height:100px;"><marquee>Wide</marquee></div>
        <div style="width: 100px; height:300px;"><marquee>Tall</marquee></div>
        <div style="width: 100px; height:100px;"><marquee>Even</marquee></div>
    </section>
    <script type="module">
        import * as v from './v4.js?a=3'
        let n = v.getContext('2d', 'test', 300, 300)
        for(let c of v.id.n) {
            c.setCanvasBg('test')
        }
        if (n) {
            n.fillStyle = 'red'
            !function a(f = 0) {
                setTimeout(a, 100, f + 10)
                n.clearRect(0, 0, 300, 300)
                n.fillRect(0, 0, f % 310, 300)
            }()
        }
    </script>
</body>

</html>
