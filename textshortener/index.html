    <style>
        *,
        ::before,
        ::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e6ecf5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #c {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 2rem 2rem 1.8rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.3s ease;
        }

        #c:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.10);
        }

        .form-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 1.5rem;
        }

        .form-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1e293b;
            margin: 0;
        }

        #saved {
            font-size: 0.95rem;
            background: #eef2f6;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #334155;
            font-weight: 500;
            white-space: nowrap;
        }

        .textarea-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .textarea-group label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #64748b;
        }

        textarea {
            width: 100%;
            padding: 0.9rem 1.1rem;
            font-size: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            background: #fafbfc;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.6;
            min-height: 80px;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;efrgtyu


            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: #ffffff;
        }

        textarea[readonly] {
            background: #f1f5f9;
            color: #0f172a;
            cursor: default;
        }

        textarea[readonly]:focus {
            border-color: #94a3b8;
            box-shadow: none;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.2rem;
        }

        .button-row .cute-green-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 60px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
            flex: 1 1 auto;
            min-width: 140px;
        }


        .button-row .cute-green-button:active {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }

        .button-row .cute-green-button:first-child {
            background: #64748b;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.25);
        }

        .button-row .cute-green-button:first-child:hover {
            background: #475569;
            box-shadow: 0 6px 20px rgba(100, 116, 139, 0.35);
        }

        .button-row .cute-green-button:last-child {
            background: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }

        .button-row .cute-green-button:last-child:hover {
            background: #059669;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .help-wrapper {
            text-align: right;
            margin-top: 0.5rem;
        }

        #help {
            font-size: 0.9rem;
            color: #64748b;
            text-decoration: none;
            border-bottom: 1px dashed #cbd5e1;
            transition: color 0.2s, border-color 0.2s;
            cursor: help;
        }

        #help:hover {
            color: #1e293b;
            border-bottom-color: #1e293b;
        }

        @media (max-width: 500px) {
            #c {
                padding: 1.5rem 1rem;
            }

            .form-header {
                flex-direction: column;
                align-items: flex-start;
            }

            #saved {
                align-self: flex-start;
            }

            #saved,
            h1 {
                margin: auto !important
            }

            .button-row .cute-green-button {
                flex: 1 1 100%;
                min-width: unset;
            }

            textarea {
                font-size: 0.95rem;
                padding: 0.7rem 0.9rem;
            }
        }
    </style>
</head>
<body>
    <form id="c" class="center">
        <div class="form-header">
            <h1>Text Shortener</h1>
            <span id="saved">Saving 0 characters</span>
        </div>
        <div class="textarea-group">
            <label for="txt">Original text</label>
            <textarea id="txt" name="txt" placeholder="Paste or type your text here…" required rows="4"></textarea>
        </div>
        <div class="textarea-group">
            <label for="output">Shortened result</label>
            <textarea id="output" placeholder="Shortened text will appear here" readonly rows="3"></textarea>
        </div>
        <div class="button-row">
            <button type="button" class="cute-green-button" id="paste">Paste</button>
            <button class="cute-green-button" id="copyShort">Copy Shortened</button>
        </div>
        <div class="help-wrapper">
            <a id="help" href="./whatisthis.html">what is this?</a>
        </div>
    </form>
    <script src="../h.js"></script>
    <script src="ie.js"></script>
    <!-- <script type="module" type="module" src="m.js"> -->
    </script>

</body>

</html>
