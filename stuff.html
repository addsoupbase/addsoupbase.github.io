<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .tiny {
            font-size: 13px;
        }

        .lholder>a::before,
        .lholder>a::after {
            background-image: url(./media/ribbon.webp);
            content: '';
            alt: '';
            display: inline-block;
            vertical-align: middle;
            width: 30px;
            height: 30px;
            background-size: contain;
        }
    </style>
</head>

<body>
    <script src="./silence.js"></script>
    <template id="template" >
        <main id="main" class="center cute-green" style="opacity: 0.95;">
            <section style="margin-top:50px;">
                <h1>Random stuff I made</h1>
                <h3>Some of it might be broken 😭</h3>
                <div id="newStuff" class="lholder" style="display:inline-grid;word-break:break-word;"></div>
                <h2>Old stuff</h2>
                <div id="oldStuff" class="lholder" style="display:inline-grid;word-break:break-word;"></div>
            </section><a class="cute-green-button back" href="main.html">Back</a>
        </main>
    </template>
    <script type="module">
        import $ from './yay.js'
        let { template } = $.byId
        document.body.appendChild(document.importNode(template.content, true))
        const { main } = $.byId
        let { newStuff, oldStuff } = $.byId
        main.fadeFromTo(0, .95)
        newStuff.push([`./marbles/play?level=data`, 'cute-emojis', 'dataurl'].map(o => {
            let url = new URL(o, `https://addsoupbase.github.io/`)
            return $(`<a class="tiny">${o}</a>`, {
                attr: {
                    href: url,
                    target: '_blank'
                }
            })
        }))
        oldStuff.push([`./whatever`, `./twehg`, `./intro`,].map(
            o => {
                let url = new URL(o, `https://addsoupbase.github.io/`)
                return $(`<a class="tiny">${o.match(/\w+/)}</a>`, {
                    attr: {
                        href: url,
                        target: '_blank'
                    }
                })
            }
        ))
    </script>
</body>

</html>
