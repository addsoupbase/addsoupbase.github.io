<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .tiny {
            font-size: 13px;
        }
    </style>
</head>

<body>
    <script type="module">
        import $ from './quick.js'
        const main = $('main,center cute-green', { parent: document.body, id: 'main', })
        main.fadein()

        let all = $("section", {
            parent: main,
            style:'margin-top:50px;'
        })
        $('h1',{parent:all, txt:'Random stuff I made'})
        $('h3', {
            parent:all,
            txt:'Some of it might be broken 😭'
        })
        let linkholder = $('ul',{parent:all,style:'display:inline-grid;word-break:break-word;'})
        $('a,cute-green-button back', {
            parent: main,
            txt: 'Back',
            href: 'main.html',
        })
        linkholder.offsprings = ['cute-emojis','dataurl',`https://magnificent-cream-beginner.glitch.me/`].map(o=>{
            let url = new URL(o,`https://addsoupbase.github.io/`)
            return $('li', {
                os: [$('a,tiny', {
                href: url,
                txt: url,
                attributes: {
                    target: '_blank'
                }
            })]
            })
        })
        $('h2',{
            parent:all,
            txt:'Old stuff'
        })
        $('ul',{parent:all,style:'display:inline-grid;word-break:break-word;',os: [`./whatever`,`./twehg`,`./intro`].map(o=> {
            let url = new URL(o,`https://addsoupbase.github.io/`)
            return $('li', {
                os: [$('a,tiny', {
                href: url,
                txt: url,
                attributes: {
                    target: '_blank'
                }
            })]
            })
        })})

    </script>
</body>

</html>
