<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .tiny {
            font-size: 13px;
        }

        .lholder>a::before, .lholder > a::after {
            background-image: url(https://addsoupbase.github.io/cute-emojis/emojis/1319312204704776285.gif);
            content: '';
            alt:'';
            display: inline-block;
            vertical-align: middle;
            width: 30px;
            height: 30px;
            background-size: contain;
        }
    </style>
</head>

<body>
    <script type="module">
        import $ from './quick.js'
        const main = $('main.center .cute-green #main', { parent: document.body, })
        main.fadein()
        main.styleMe({opacity:.95})
        let all = $("section", {
            parent: main,
            attr: {
                style: 'margin-top:50px;'
            }
        })
        $('h1<Random stuff I made>', { parent: all })
        $('h3<Some of it might be broken 😭>', {
            parent: all,
        })
        let linkholder = $('div .lholder', { parent: all, attr: { style: 'display:inline-grid;word-break:break-word;' } })
        $('a.cute-green-button .back', {
            parent: main,
            txt: 'Back',
            attr: {
                href: 'main.html',
            }
        })
        linkholder.batch(['cute-emojis', 'dataurl'].map(o => {
            let url = new URL(o, `https://addsoupbase.github.io/`)
            return $(`a.tiny <${o}>`, {
                attr: {
                    href: url,
                    target: '_blank'
                }
            })
        }))
        $('h2 <Old stuff>', {
            parent: all,
        })
        let di = $('div.lholder', { parent: all, attr: { style: 'display:inline-grid;word-break:break-word;' } })
            ;[`./whatever`, `./twehg`, `./intro`].forEach(o => {
                let url = new URL(o, `https://addsoupbase.github.io/`)
                $(`a.tiny <${o.match(/\w+/)}>`, {
                    parent: di,
                    attr: {
                        href: url,
                        target: '_blank'
                    }
                })
            })
    </script>
</body>

</html>
