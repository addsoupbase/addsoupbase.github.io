<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            font-family: monospace;
        }

        figure {
            padding-block: 10px;
            height: fit-content;
        }

        a {
            display: block;
            width: 100px;
        }

        figure {
            border: 1px solid black;
            text-align: center;
            place-items: center;
            /* image-rendering: pixelated; */
            place-self: anchor-center;
            display: grid;
            place-content: center;
            place-self: auto;
        }

        figcaption {
            width: 100px;
            font-size: large;
            cursor: pointer;
            margin-block: 8px;
            --user-select: none
        }

        slide-show {
            position: relative;
            left: 50%;
            top: 50%;
            place-self: baseline;
            transform: scale(1.5);
        }

        slide-show,
        slide-show::part(sprite) {
            pointer-events: none;
        }

        label {
            width: 100%;
            display: flex;
            place-self: flex-start;
            cursor: pointer;
        }
    </style>
    <script blocking="render" src="./css.js"></script>
</head>

<body>
    <input type="file" id="u" webkitdirectory multiple>
    <div id="holder" style="display: flex; flex-wrap: wrap;"></div>
    <script type="module">
        import * as v from './v4.js'
        import JSZip from 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm'
        import preload from './webcomponents/slide-show.js'
        let $ = v.esc
        let { u, holder } = v.id
        let blobs = new Map
        let accept = /Offsets|Shadow/
        let directions = {}
        holder.delegate({
            click() {
                let toggle = [].slice.call(this.parent.querySelectorAll('input'))
                let bool = toggle.every(o => !o.checked)
                toggle.forEach(o => o.checked = bool)
            }
        }, o => o.matches('figcaption'))
        u.on({
            async change() {
                this.replaceWith($`<button (click)="${async function () {
                    // the first time i've EVER used Object.groupBy!
                    // i LOVE using new stuff and figuring out use cases for it! :D
                    let checked = Object.groupBy([].filter.call(holder.querySelectorAll("input"), o => o.checked), o => o.parentNode.parentNode.querySelector('figcaption').textContent)
                    let frames = {}
                    let json = {}
                    let zip = JSZip()
                    for (let anim in checked)
                        frames[anim] = checked[anim].map(o => +o.dataset.dir)
                    for (let anim in frames) {
                        let dirs = frames[anim]
                        let sprites = directions[anim]
                        let { width, height, y, yTotal, durations } = sprites
                        let yThing = (yTotal / y) * dirs.length
                        let canvas = new OffscreenCanvas(width * durations.length, height * yThing)
                        let ctx = canvas.getContext('2d')
                        let a = 0
                        let die = directions[anim]
                        let totalDirections = dirs.length
                        for (let i = 0; i < yTotal / y; ++i) 
                            for (let ii = 0; ii < totalDirections; ++ii) {
                                let sect = die[dirs[ii]][i]
                                ctx.drawImage(sect, 0, 0)
                                ctx.translate(0, height)
                            }
                        json[anim] = {
                            framesY: yThing,
                            values: durations.join(';'),
                            frameWidth: width,
                            frameHeight: height
                        }
                        zip.file(`${pkm}-${anim}.png`, await canvas.convertToBlob())
                    }
                    zip.file(`${pkm}.json`, JSON.stringify(json))
                    let anchor = $`<a href="${URL.createObjectURL(await zip.generateAsync({ type: 'blob' }))}" download="${pkm}.zip"></a>`.to(document.body)
                    anchor.click()
                    anchor.remove()
                }}">Download</button>`.valueOf())
                let anims = {}
                let xml = null
                for (let file of this.files) if (!accept.test(file.name)) {
                    if (file.name === 'AnimData.xml') {
                        xml ??= new DOMParser().parseFromString(await file.text(), 'text/xml')
                        continue
                    }
                    let path = file.webkitRelativePath.split('/')
                    var pkm = pkm ?? path[0]
                    let files = anims[file.name.replace('-Anim.png', '')] ??= { normal: [], shiny: [] }
                    files[path[1] === 'shiny' ? 'shiny' : "normal"].push(file)
                    // await process(file, pkm)
                }
                for (let anim in anims) {
                    let a = anims[anim]
                    a.normal.sort(sortFilesByName)
                    a.shiny.sort(sortFilesByName)
                }
                process(anims, pkm, await xmlToObj(xml, anims))
            }
        })
        function sortFilesByName(a, b) {

            return a.lastModified - b.lastModified
        }
        let completeFrames = {}
        async function process(anims, pokemon, data) {

        }
        async function xmlToObj(xml, anims) {
            let out = {}
            for (let anim of xml.querySelectorAll('Anim')) {
                let animName = anim.querySelector('Name').textContent
                if (anim.querySelector('CopyOf')) continue// out[animName] = out[isCopy]
                let animFiles = anims[animName]
                let { normal = [], shiny = [] } = animFiles
                let allFrames = normal.concat(shiny)
                let spritesheets = []
                let width = +anim.querySelector('FrameWidth').textContent,
                    height = +anim.querySelector('FrameHeight').textContent
                let durations = [].map.call(anim.querySelectorAll('Duration'), mapDura)
                let y
                let myDirections
                for (let i = 0, l = allFrames.length; i < l; ++i) {
                    let animFile = allFrames[i]
                    let src = URL.createObjectURL(animFile)
                    let img = $`<img src="${src}">`
                    await img.until('load', 'error')
                    img = img.valueOf()
                    spritesheets.push(img.valueOf())
                    y ??= img.naturalHeight / height
                    myDirections ??= directions[animName] = Array.from({ length: y }, () => [])
                    URL.revokeObjectURL(src)
                    for (let ii = 0; ii < y; ++ii) {
                        let canvas = new OffscreenCanvas(img.naturalWidth, height)
                        let ctx = canvas.getContext('2d')
                        ctx.drawImage(img, 0, height * -ii)
                        myDirections[ii].push(canvas)
                        canvas.nameThing = animFile.webkitRelativePath
                    }
                    out[animName] = { width, height, durations, y, yTotal: allFrames.length * y }
                }
                myDirections.height = height
                myDirections.width = width
                myDirections.y = y
                myDirections.durations = durations
                Object.defineProperty(myDirections, 'yTotal', {
                    get() {
                        return y * this[0].length
                    }
                })
                myDirections[0][0].convertToBlob().then(src => {
                    src = URL.createObjectURL(src)
                    preload({ src, framesX: durations.length, duras: durations, framesY: 1, frameWidth: width, frameHeight: height })
                    [0].then(URL.revokeObjectURL.bind(URL, src))
                    container.unshiftNode($`<slide-show dur=".03" src="${src}" autoplay></slide-show>`)
                })
                let container = holder.$`<figure><figcaption title="Click to check/uncheck all">${animName}</figcaption>${$(Array.from({ length: y }, (_, i) => `<label><input data-dir="${i}" type="checkbox">${getAxisName(i)}</label>`))}</figure>`
            }
            return out
        }
        holder.delegate({
            repeatEvent() {
                this.index++
            }
        })
        function mapDura(o) { return +o.textContent }
        let axe = `Down,Down Right,Right,Up Right,Up,Up Left,Left,Down Left`.split(',')
        function getAxisName(y) {
            return axe[y] || ''
        }
    </script>
</body>

</html>
