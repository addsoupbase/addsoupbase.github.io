    <script type="module">
        // 
        import $ from './yay.js'

        let diaryHeading = $.gid('diary-heading')
        let diaryContainer = $.gid('diary-container')
        function getMSThingy() {
            return Date.UTC((new Date).getFullYear(), (new Date).getMonth(), (new Date).getDate())
        }
        async function setEntry(date) {
            diaryHeading.textContent = new Date(date).toLocaleDateString()
            diary.destroyChildren()
            let req = (await fetch(`./entries/${date}.html`))
            if (!req.ok) return diary.push($(`<h1 class="center">No entry for today :(</h1>`))
            diary.$(await req.text())
        }
        let diary = $.gid('diary')
        let m = $.gid('main')
        setEntry(13213)
